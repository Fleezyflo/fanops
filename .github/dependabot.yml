version: 2
# Roadmap Phase 4b — scoped NARROWLY on purpose. yt-dlp moves fast and has had security-relevant
# releases, so it earns automated update PRs; the other deps (pydantic / requests / python-dotenv /
# flask) are stable enough that broad Dependabot noise isn't worth it on a single-operator tool.
# SECURITY.md / CODEOWNERS were deliberately NOT added (enterprise checkboxes for a localhost tool).
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    allow:
      - dependency-name: "yt-dlp"
    commit-message:
      prefix: "chore"
