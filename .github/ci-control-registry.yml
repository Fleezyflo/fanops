  # ===== architecture.yml ===========================================================================
  - id: ARCH-GATE
    name: "gate (drift + policy + registries)"
    invariant: "derived artifacts byte-match source + no BLOCKING policy finding + registries valid — rendered to the job summary for VISIBILITY"
    owner: arch-engine
    workflow: .github/workflows/architecture.yml
    job: gate
    step: "Regenerate + byte-compare + policy + registries"
    command: "python -m tools.arch ci"
    trigger: [pull_request, push]
    classification: advisory
    runtime_class: fast
    timeout_minutes: 10
    concurrency: "arch-<workflow>-<ref>, cancel-in-progress"
    justification: "ADVISORY since 2026-07-22 — a standalone, readable `tools.arch ci` verdict (drift + policy + registries) on every PR; stdlib-only, zero installs. It does not block a merge; the same checks block through the unit lane (CI-UNIT-ARCHGOV)."
    deletion_consequence: "arch governance loses its fast, standalone, human-readable verdict and its job summary. The drift/policy/registry checks themselves keep blocking via CI-UNIT-ARCHGOV, so this is a legibility loss rather than an enforcement gap — which is exactly why it can be advisory."
    duplicate_group: arch-drift-policy
    adr: [ADR-0100, ADR-0101]
    branch_protection_context: "gate (drift + policy + registries)"
    failure_evidence: "tools.arch ci exits non-zero on drift/policy/registry failure; the job reddens without blocking."
    evidence_status: verified-this-session
    status: active
    notes: "ADVISORY (ADR-0101 as amended 2026-07-22, CI simplification). Model A named this the authoritative required merge-gate and OGD M1 would have promoted it; OGD is cancelled, so the authoritative merge-blocking line for arch drift/policy/registries is permanently CI-UNIT-ARCHGOV. `branch_protection_context` is retained as the job's exact context STRING — it is not in the required set."

  - id: ARCH-IMPACT
    name: "impact report"
    invariant: "a PR's architectural blast radius is COMPUTABLE and not BREAKING / UNKNOWN_IMPACT"
    owner: arch-engine
    workflow: .github/workflows/architecture.yml
    job: impact
    step: "Fail on BREAKING / UNKNOWN_IMPACT"
    command: 'python -m tools.arch impact --base "<base.sha>" --strict'
    trigger: [pull_request]
    classification: advisory
    runtime_class: fast
    timeout_minutes: 10
    justification: "the ONLY detector of an uncomputable / breaking architectural blast radius on a PR."
    deletion_consequence: "UNKNOWN_IMPACT / BREAKING diffs lose their only detector — UNIQUE, no blocking backup."
    duplicate_group: null
    adr: [ADR-0101]
    branch_protection_context: null
    failure_evidence: "impact --strict exits non-zero on BREAKING/UNKNOWN_IMPACT."
    evidence_status: verified-this-session
    status: active
    notes: "PROMOTION CANDIDATE — but ONLY after an advisory observation period quantifies its UNKNOWN_IMPACT / false-positive rate (ADR-0101 promotion criterion 2)."

  - id: ARCH-CONTROLS
    name: "negative controls (validator effectiveness)"
    invariant: "the negative-control suite proves every validator discriminates (fires on an injected defect)"
    owner: arch-engine
    workflow: .github/workflows/architecture.yml
    job: controls
    step: "Negative controls"
    command: "python -m tools.arch selftest"
    trigger: [pull_request, push]
    classification: advisory
    runtime_class: slow
    timeout_minutes: 15
    justification: "standalone selftest visibility + the push-to-main and path-selected dimension; fails OPEN on an unreadable diff (tested)."
    deletion_consequence: "the standalone selftest surface + push-to-main run disappears; the merge-blocking neg-control path rides CI-E2E-NEGCONTROLS."
    duplicate_group: negative-controls
    adr: [ADR-0100]
    branch_protection_context: null
    failure_evidence: "tools.arch selftest exits non-zero if any control fails to fire."
    evidence_status: verified-this-session
    status: transitional
    notes: "SLICE-NEGCTRL-DEDUP (6.3): on an arch-relevant PR this runs the SAME selftest.detect as CI-E2E-NEGCONTROLS. Reduce to a lightweight reachability assertion; keep the full run in exactly one authoritative place."

  - id: ARCH-RECONCILE
    name: "scheduled reconciliation"
    invariant: "weekly: canonical artifacts still match code — INCLUDING newly-created untracked artifacts; never a silent rewrite (reviewable diff, exits 1 on drift)"
    owner: arch-engine
    workflow: .github/workflows/architecture.yml
    job: reconcile
    step: "Regenerate and detect drift (produces a reviewable diff, never a silent rewrite)"
    command: "python -m tools.arch regen && python -m tools.arch docs && drift-check(untracked-aware)"
    trigger: [schedule]
    classification: scheduled
    runtime_class: slow
    timeout_minutes: 20
    justification: "the only control that catches an 11th, brand-new untracked derived artifact the per-PR gate is structurally blind to."
    deletion_consequence: "slow-accumulating drift (esp. a newly-generated untracked artifact) goes undetected."
    duplicate_group: null
    adr: [ADR-0100]
    branch_protection_context: null
    failure_evidence: "the job exits 1 if `git diff` is non-empty OR untracked output exists."
    evidence_status: verified-this-session
    status: active
    notes: "cron 17 5 * * 1 (Mondays 05:17 UTC); NEVER a PR check."

  # ===== lane-guard.yml =============================================================================
  - id: LANE-GUARD
    name: "lane file-ownership + cross-PR collision"
    invariant: "no branch edits a hot file owned by a different lane; no two OPEN PRs edit the same hot file"
    owner: ci-lane
    workflow: .github/workflows/lane-guard.yml
    job: lane-guard
    step: "Lane hot-file ownership + Cross-open-PR hot-file collision guard"
    command: "python scripts/lane_guard.py ... && python scripts/pr_collision_guard.py ..."
    trigger: [pull_request]
    classification: advisory
    runtime_class: fast
    timeout_minutes: 10
    concurrency: "lane-guard-<workflow>-<ref>, cancel-in-progress"
    justification: "ADVISORY since 2026-07-22 — mechanical reporting of the AGENTS.md parallelism rules for multi-agent waves (ADR 0095). Both the lane hot-file ownership check and the cross-open-PR collision guard run on every PR and are read; neither blocks a merge."
    deletion_consequence: "concurrent multi-agent work can collide on a hot file with no signal at all. Advisory keeps the signal and removes only the block — which suits a check whose Linear lookup is best-effort and fails open without LINEAR_API_KEY, i.e. one that could never honestly gate a merge."
    duplicate_group: null
    adr: [ADR-0101]
    branch_protection_context: "lane file-ownership + cross-PR collision"
    failure_evidence: "lane_guard.py / pr_collision_guard.py exit non-zero on a cross-lane or cross-PR hot-file clash; the job reddens without blocking."
    evidence_status: verified-this-session
    status: active
    notes: "ADVISORY (ADR-0101 as amended 2026-07-22, CI simplification). It was slated to become the 3rd required context under OGD after an observation window; OGD is cancelled, so it stays advisory and the observation window is moot. `branch_protection_context` is retained as the job's exact context STRING — it is not in the required set. `timeout_minutes`/`concurrency` corrected here to the values the workflow actually declares (they were recorded as null)."

