# .github/ci-control-registry.yml
# =====================================================================================================
# FanOps CI Control Registry — the machine-readable bridge between ADR policy, workflow implementation,
# and live GitHub branch protection. Proposed by ADR-0100.
#
# THIS IS NOT AN INDEPENDENT SOURCE OF TRUTH. It is the reconciling middle plane:
#   ADRs (docs/adr/) own policy/rationale  ->  THIS registry owns the intended executable inventory
#   ->  workflows (.github/workflows/) implement  ->  GitHub branch protection enforces the required set
#   ->  validators (Phase C, DC-1..DC-6) prove all planes agree  ->  generated docs present the state.
#
# Authority order when planes disagree (ADR-0100): executable source & tests > live GitHub config >
# accepted ADRs & this registry > generated docs > historical prose.
#
# STATUS: ACCEPTED and ACTIVELY CONSUMED (status prose corrected 2026-07-18; `status:` below has said
# `accepted` since this file was authored). Both conditions the original line named are met: ADR-0100 is
# accepted, and the Phase-C validators landed as `tools/ci`. No workflow STEP names this file, but the
# LIVE REQUIRED `unit` lane reads it on every PR via tests/test_ci_registry_validator.py -> tools/ci, so a
# registry<->workflow divergence reddens a required context. Schema validation is BEST-EFFORT, not
# guaranteed: tools/ci/registry.py skips it when `jsonschema` is absent, and `jsonschema` is declared in
# neither requirements/ nor pyproject.toml — the hand-rolled shape checks still run.
#   ORIGINAL LINE, preserved (written 2026-07-15 in the same commit as `status: accepted`, i.e. stale on
#   arrival — not drift): "STATUS: proposed — inert until ADR-0100 is accepted and the Phase-C validators
#   land. No workflow reads this file yet. Validated against ci-control-registry.schema.json."
#
# Identity rule: `id` is STABLE. A job's display `name:` may change; the id never does. Renaming a job
# that backs a required context is caught by DC-1 (the anti-silent-detach mechanism, ADR-0101).
# Line anchors are evidence, not identity, and rot (INV-20) — controls key on id + job + step.
# =====================================================================================================
version: 1
status: accepted
generated_view: docs/ci/CI_CONTROL_INVENTORY.md
# Validators live in a dedicated tools/ci module (ADR-0100, operator amendment) — NOT tools/arch.

# OGD IS CANCELLED (operator decision, 2026-07-22). OGD — Operational Governance Deployment — was the
# staged rollout that would have added three more required contexts to live branch protection, one
# mutation at a time. It will not happen. The required set is now FINAL at the two contexts below, and
# `intended` equals `current` equals LIVE, so there is no pending expansion for DC-3 to report and no
# runbook left to execute. The term is retained here only so the merged history stays readable.
#
# What replaced it: `unit (fast, no toolchain)` is the sole ROUTINE PR blocker for logic, and
# `real-tooling E2E (must run, not skip)` stays required as a CONTEXT but its suite is ON-DEMAND —
# manual dispatch, the nightly schedule, or an explicit force-e2e request. It does NOT run on an
# ordinary push or pull request (see CI-E2E `trigger_gate`). Everything else — the architecture gate,
# impact, base-install, lane guard and the cross-PR collision guard — is ADVISORY: it still runs and
# is still read, it just no longer blocks a merge. Rationale:
# docs/adr/0101-required-checks-and-merge-gate-policy.md.

# Rollout model (ADR-0101). `current_required_contexts` is what SHOULD be live right now; DC-3
# requires live == current (blocking). `phase: enforced` means THE REQUIRED SET IS FINAL — any
# current/intended divergence is a failure rather than a planned transition. It does NOT assert that
# GitHub admin enforcement is on; `enforce_admins` is false and changing it is a separate,
# operator-approved repository-settings change that no PR performs.
rollout:
  phase: enforced                 # transitioning | enforced — see the note above on what this asserts
current_required_contexts:        # matches LIVE GitHub, re-read 2026-07-22
  - "unit (fast, no toolchain)"
  - "real-tooling E2E (must run, not skip)"

# Plane 1 — the merge policy the repository INTENDS (ADR-0101, amended 2026-07-22). DC-3 reconciles
# this against LIVE GitHub. It equals `current` and equals live: the set is final, not a staging post.
intended_required_contexts:
  - "unit (fast, no toolchain)"
  - "real-tooling E2E (must run, not skip)"

# ---------------------------------------------------------------------------------------------------
# Registered intentional redundancy. A control may share an invariant with another ONLY via a group
# here, which must state the DISTINCT boundary each member protects. Silent duplication = validator red.
# ---------------------------------------------------------------------------------------------------
duplicate_groups:
  arch-drift-policy:
    reason: >-
      One architecture-governance implementation (tools/arch policy + drift + registries) reached two
      ways. With OGD cancelled (2026-07-22) ARCH-GATE is ADVISORY and will not become a required
      context, so the unit lane is PERMANENTLY the merge-blocking line for arch drift/policy/registries.
      The overlap is therefore no longer a transitional residual awaiting de-dup — it is the design:
      the advisory gate gives a fast, standalone, readable arch verdict, and the unit lane is what
      actually blocks. Retained deliberately, not silently duplicated.
    members: [ARCH-GATE, CI-UNIT-ARCHGOV]
    distinct_boundaries:
      ARCH-GATE: "ADVISORY — a standalone, readable `tools.arch ci` verdict per PR (drift + policy + registries) that does not block a merge."
      CI-UNIT-ARCHGOV: "the merge-blocking line: the invariants the gate does NOT run (regeneration determinism, generated-artifacts-are-a-pure-function-of-source, rule reachability, field-authority) PLUS the drift/policy/registries checks, collected in the sole routine PR blocker."
    remediation: >-
      Keep both. De-duplication is CLOSED, not deferred: scoping the unit lane down to the four
      distinct invariants would leave arch drift/policy/registries with no merge-blocking enforcement
      at all, because the only other implementation is now advisory. The earlier plan to de-dup after
      ARCH-GATE became required died with OGD.
  negative-controls:
    reason: "One selftest.detect implementation invoked via two harnesses (pytest test case + CLI verb)."
    members: [CI-E2E-NEGCONTROLS, ARCH-CONTROLS]
    distinct_boundaries:
      CI-E2E-NEGCONTROLS: "the ON-DEMAND path — collected in the `e2e` slow step, which since 2026-07-22 runs only on a manual dispatch, the nightly schedule or an explicit force-e2e request (see CI-E2E `trigger_gate`). The controls are `@pytest.mark.slow` and the unit lane deselects `slow`, so THEY DO NOT RUN ON ANY PULL REQUEST. It is no longer a merge-blocking path; ARCH-CONTROLS below is what a PR actually sees, and it is advisory."
      ARCH-CONTROLS: "standalone CLI selftest visibility + the push-to-main and path-selected dimension; advisory. Since 2026-07-22 this is the ONLY negative-control execution a pull request gets."
    remediation: "Keep both, for a reason that changed on 2026-07-22: they no longer overlap on a PR at all. ARCH-CONTROLS is the sole PR-visible run (advisory), CI-E2E-NEGCONTROLS the on-demand/nightly one. The former SLICE-NEGCTRL-DEDUP plan is dead — removing either would leave a real gap rather than trimming a duplicate. NOTE the honest consequence: no negative-control run BLOCKS a merge any more."
  ruff-scopes:
    reason: "ruff runs at deliberately-tiered scopes; each protects a different feedback boundary (not duplication)."
    members: [CI-UNIT-LINT, LOCAL-RUFF-PRECOMMIT, LOCAL-CHECK-SH]
    distinct_boundaries:
      CI-UNIT-LINT: "the authoritative FULL-tree, merge-blocking lint."
      LOCAL-RUFF-PRECOMMIT: "staged-file pre-commit fast feedback."
      LOCAL-CHECK-SH: "scoped pre-push accelerator (lint + test-mapping)."
    remediation: "keep all — deliberate scope-tiering (6.4). Document each; remove none."
  secret-scan:
    reason: "One shared scripts/scan-secrets.sh with two callers protecting different moments."
    members: [CI-UNIT-SECRETSCAN, LOCAL-SECRETSCAN]
    distinct_boundaries:
      CI-UNIT-SECRETSCAN: "the merge-blocking PR-diff scan (authoritative)."
      LOCAL-SECRETSCAN: "pre-commit staged-diff scan (early local catch)."
    remediation: "keep both — shared implementation, not duplicated code (6.12)."

# ---------------------------------------------------------------------------------------------------
controls:

  # ===== ci.yml · unit (composite, REQUIRED) ========================================================
  - id: CI-UNIT
    name: "unit (fast, no toolchain)"
    invariant: "the hermetic logic suite + lint + SLO + secret-scan + lock-drift + skip->fail hook all pass on the PR head"
    owner: ci-lane
    workflow: .github/workflows/ci.yml
    job: unit
    trigger: [pull_request, push]
    classification: required
    runtime_class: medium
    timeout_minutes: 15
    concurrency: "ci-<workflow>-<ref>, cancel-in-progress"
    dependencies: []
    artifacts: ["ci-timing.partial.json (main push only)"]
    consumers: [CI-TIMING]
    justification: "the fast, toolchain-free gate that carries the bulk of the merge-blocking logic guarantees; one of the two live required contexts."
    deletion_consequence: "the entire hermetic merge gate disappears; logic/lint/secret/lock regressions and the arch-invariant blocking path all merge unchecked."
    duplicate_group: null
    adr: [ADR-0101]
    branch_protection_context: "unit (fast, no toolchain)"
    failure_evidence: "any red step fails the job; the job is a LIVE required context (Phase-A freeze branch-protection.json)."
    evidence_status: verified-this-session
    status: active

  - id: CI-UNIT-SECRETSCAN
    name: "Secret scan (PR diff) — MOL-193"
    parent: CI-UNIT
    invariant: "no secret is introduced in the PR diff"
    owner: ci-lane
    workflow: .github/workflows/ci.yml
    job: unit
    step: "Secret scan (PR diff) — MOL-193"
    command: './scripts/scan-secrets.sh diff-base "<base.sha>"'
    trigger: [pull_request]
    classification: required
    runtime_class: fast
    justification: "blocks credential leakage at the PR boundary."
    deletion_consequence: "a committed secret in a PR diff merges undetected."
    duplicate_group: secret-scan
    adr: [ADR-0101]
    failure_evidence: "scan-secrets.sh exits non-zero on a planted secret (shared script; also LOCAL-SECRETSCAN)."
    evidence_status: verified-this-session
    status: active

  - id: CI-UNIT-LOCKDRIFT
    name: "Lockfile drift guard — MOL-195"
    parent: CI-UNIT
    invariant: "requirements locks are regenerated whenever pyproject deps change"
    owner: ci-lane
    workflow: .github/workflows/ci.yml
    job: unit
    step: "Lockfile drift guard (pyproject deps must not change without regen — MOL-195)"
    command: './scripts/check-locks.sh "<base.sha>"'
    trigger: [pull_request]
    classification: required
    runtime_class: fast
    justification: "keeps the hashed, reproducible install honest — a dep change without a lock regen is caught."
    deletion_consequence: "a dependency change ships without a matching hashed lock -> non-reproducible / unverified install."
    duplicate_group: null
    adr: [ADR-0101]
    failure_evidence: "check-locks.sh exits non-zero when pyproject deps change without lock regen."
    evidence_status: verified-this-session
    status: active

  - id: CI-UNIT-ENVPROBE
    name: "CI env probe (unit lane)"
    parent: CI-UNIT
    invariant: "the unit lane's ffmpeg/cv2 availability is MEASURED, not inferred from YAML"
    owner: ci-lane
    workflow: .github/workflows/ci.yml
    job: unit
    step: "CI env probe (unit lane — MEASURE ffmpeg/cv2, do not infer from YAML)"
    command: "python scripts/ci_env_probe.py"
    trigger: [pull_request, push]
    classification: required
    runtime_class: fast
    justification: "the unit lane installs [framing]; the probe proves the toolchain state rather than assuming it."
    deletion_consequence: "a wrong assumption about toolchain presence in the unit lane goes unnoticed."
    duplicate_group: null
    adr: [ADR-0101]
    failure_evidence: "ci_env_probe.py asserts measured availability and exits non-zero on mismatch."
    evidence_status: verified-this-session
    status: active

  - id: CI-UNIT-LINT
    name: "Lint (ruff — pyflakes F + pycodestyle E)"
    parent: CI-UNIT
    invariant: "no pyflakes-F / pycodestyle-E defect under the house ruleset (E701/E702/E401/E501 ignored — pyproject)"
    owner: ci-lane
    workflow: .github/workflows/ci.yml
    job: unit
    step: "Lint (ruff — pyflakes F + pycodestyle E, the house ruleset in pyproject)"
    command: "ruff check ."
    trigger: [pull_request, push]
    classification: required
    runtime_class: fast
    justification: "the authoritative full-tree lint; the compact one-liner house style is deliberate (ADR 0092)."
    deletion_consequence: "lint regressions merge; the house ruleset stops being enforced in CI."
    duplicate_group: ruff-scopes
    adr: [ADR-0101]
    failure_evidence: "ruff exits non-zero on an F/E defect."
    evidence_status: verified-this-session
    status: active

  - id: CI-UNIT-PYTEST
    name: "Unit tests"
    parent: CI-UNIT
    invariant: "the hermetic logic suite (no integration, no slow) is green"
    owner: ci-lane
    workflow: .github/workflows/ci.yml
    job: unit
    step: "Unit tests"
    command: 'python -m pytest -q -n auto -m "not integration and not slow"'
    trigger: [pull_request, push]
    classification: required
    runtime_class: medium
    justification: "the core logic regression gate; CI is the sole test authority (ADR 0088; local pytest denied)."
    deletion_consequence: "logic regressions merge undetected."
    duplicate_group: null
    adr: [ADR-0101]
    failure_evidence: "any failing unit test reddens the required job."
    evidence_status: verified-this-session
    status: active

  - id: CI-UNIT-SLO
    name: "Unit pytest SLO gate (blocking — MOL-460)"
    parent: CI-UNIT
    invariant: "unit pytest wall-time <= budget (135 s PR / 140 s main)"
    owner: ci-lane
    workflow: .github/workflows/ci.yml
    job: unit
    step: "Unit pytest SLO gate (blocking — MOL-460)"
    command: "python scripts/ci_slo_gate.py --log pytest-unit.log"
    trigger: [pull_request, push]
    classification: required
    runtime_class: fast
    justification: "keeps the fast lane fast — an unbounded unit-suite slowdown is a real regression (ADR 0094)."
    deletion_consequence: "the unit suite can slow without bound; the fast-feedback contract silently erodes."
    duplicate_group: null
    adr: [ADR-0101]
    failure_evidence: "ci_slo_gate.py exits non-zero when measured wall-time exceeds CI_UNIT_PYTEST_BUDGET_S."
    evidence_status: verified-this-session
    status: active

  - id: CI-UNIT-HOOKVERIFY
    name: "Verify FANOPS_REQUIRE_E2E skip->fail hook (must fail, not skip)"
    parent: CI-UNIT
    invariant: "the conftest skip->fail hook converts an integration skip into a FAILURE (so the e2e job can never silently skip)"
    owner: ci-lane
    workflow: .github/workflows/ci.yml
    job: unit
    step: "Verify FANOPS_REQUIRE_E2E skip->fail hook (must fail, not skip)"
    command: "python -m pytest -q tests/test_ci_require_e2e.py ; test $? -eq 1"
    trigger: [pull_request, push]
    classification: required
    runtime_class: fast
    justification: "guards the guard — proves the fail-loud mechanism that makes CI-E2E's must-run guarantee real."
    deletion_consequence: "the e2e must-run guarantee becomes unprovable; a silently-skipping e2e suite could report green."
    duplicate_group: null
    adr: [ADR-0101]
    failure_evidence: "the step asserts pytest exits EXACTLY 1 (a skip or a pass both fail the assertion)."
    evidence_status: verified-this-session
    status: active

  - id: CI-UNIT-ARCHGOV
    name: "architecture governance (collected in the unit suite)"
    parent: CI-UNIT
    invariant: "architecture governance holds: no BLOCKING policy finding; derived artifacts byte-match source; registries valid; every rule reachable"
    owner: arch-engine
    workflow: .github/workflows/ci.yml
    job: unit
    step: "collected: tests/test_arch_governance.py (runs within the unit suite)"
    command: 'pytest -m "not integration and not slow" (collects test_arch_governance.py)'
    trigger: [pull_request, push]
    classification: required
    runtime_class: fast
    justification: "the unit-lane arch tests. Since 2026-07-22 ARCH-GATE is advisory and will not be promoted, so this collection is PERMANENTLY the sole merge-blocking enforcement of arch drift/policy/registries, AND it carries the distinct invariants gate does not run (determinism, pure-function-of-source, reachability, field-authority). The overlap is retained by design (duplicate_group arch-drift-policy); de-dup is CLOSED, not deferred."
    deletion_consequence: "arch drift/policy/registries lose their ONLY merge-blocking enforcement AND the distinct invariants (determinism, pure-function-of-source, reachability, field-authority) lose their check. With ARCH-GATE advisory there is no second blocking implementation to fall back on, so this is unconditionally the worst deletion in the arch set."
    duplicate_group: arch-drift-policy
    adr: [ADR-0100, ADR-0101]
    failure_evidence: "test_no_blocking_policy_findings / test_derived_artifacts_are_not_stale fail on an injected defect; the negative-control suite proves the validators discriminate."
    evidence_status: verified-this-session
    status: active

  - id: CI-UNIT-CIVALIDATOR
    name: "CI control-registry validator (collected in the unit suite)"
    parent: CI-UNIT
    invariant: "the CI planes agree statically: the committed registry conforms to shape, and the registry<->workflow static checks (DC-1/2/4/5/6) produce no BLOCKING divergence"
    owner: ci-lane
    workflow: .github/workflows/ci.yml
    job: unit
    step: "collected: tests/test_ci_registry_validator.py (runs within the unit suite)"
    command: 'pytest -m "not integration and not slow" (collects test_ci_registry_validator.py)'
    trigger: [pull_request, push]
    classification: required
    runtime_class: fast
    justification: "the tools/ci static validator run as a unit test, so DC-1/2/4/5/6 block a PR that diverges the registry from the workflow implementation. It delegates to tools.ci.checks.run_static + shape_findings — the SAME code the CLI `static` verb runs — so the pytest gate and the CLI can never disagree on a commit. DC-3 (deployed-state vs live GitHub) is NOT here: it needs an authenticated admin probe and is a scheduled concern (ADR-0100, ADR-0101)."
    deletion_consequence: "registry<->workflow drift stops blocking PRs — a renamed required context (DC-1), an untracked job or phantom control (DC-2), prose calling a required context advisory (DC-4), a duplicate_group naming an unknown control (DC-5), or a job that drops its timeout / SHA-pin (DC-6) would merge unchallenged. The exact divergence class the control registry exists to prevent."
    duplicate_group: null
    adr: [ADR-0100, ADR-0101]
    failure_evidence: "test_static_planes_have_no_blocking_divergence fails when checks.run_static returns a blocking finding; test_negative_control_fires proves each DC discriminates on an injected defect."
    evidence_status: verified-this-session
    status: active

  # ===== ci.yml · base-install (ADVISORY, unique) ===================================================
  - id: CI-BASEINSTALL
    name: "base install (no extras) refuses smart-framing"
    invariant: "the base package (no extras) imports, the CLI runs, and the render prerequisite REFUSES loudly (never a silent centre-crop)"
    owner: ci-lane
    workflow: .github/workflows/ci.yml
    job: base-install
    step: "Base-install smoke — cv2 absent, fanops+CLI import, representative op, render prereq refuses"
    command: "python scripts/base_install_smoke.py"
    trigger: [pull_request, push]
    classification: advisory
    runtime_class: fast
    timeout_minutes: 10
    dependencies: []
    artifacts: []
    consumers: []
    justification: "the ONLY control exercising the clean, extras-absent packaging path and the cv2 fail-closed contract (ADR 0034). ADVISORY since 2026-07-22: it runs on every PR and its verdict is read, but it does not block a merge."
    deletion_consequence: "a packaging regression that breaks a clean no-extras install, or a silent centre-crop instead of a loud refusal, ships with no signal at all — no other control covers this. Advisory means UNBLOCKING, not unwatched: deleting the job is a different and worse act than declassifying it."
    duplicate_group: null
    adr: [ADR-0101]
    branch_protection_context: "base install (no extras) refuses smart-framing"
    failure_evidence: "base_install_smoke.py exits non-zero if import / CLI / refuse-loudly contract breaks; the job reddens without blocking."
    evidence_status: verified-this-session
    status: active
    notes: "ADVISORY (ADR-0101 as amended 2026-07-22, CI simplification). It was slated to become the 2nd required context under OGD; OGD is cancelled, so it stays advisory. `branch_protection_context` is retained as the job's exact context STRING — it is not in the required set."

  # ===== ci.yml · e2e (composite, REQUIRED) =========================================================
  - id: CI-E2E
    name: "real-tooling E2E (must run, not skip)"
    invariant: "when the full lane is REQUESTED (manual dispatch, the nightly schedule, or force-e2e) the real ffmpeg/whisper/espeak pipeline actually runs (not mocks) and never silently skips; @slow cross-face proofs pass; cv2 present. On an ordinary push or pull request the context reports in seconds and the suite does not run."
    owner: ci-lane
    workflow: .github/workflows/ci.yml
    job: e2e
    trigger: [pull_request, push, workflow_dispatch, schedule]
    classification: required
    runtime_class: slow
    timeout_minutes: 25
    dependencies: []
    artifacts: ["ci-timing.partial.json (main push only)"]
    consumers: [CI-TIMING]
    justification: "proves the pipeline is real, not mocked — the second and final live required context."
    deletion_consequence: "the real-tooling proof disappears; a broken render could be masked by mocks and merge."
    duplicate_group: null
    adr: [ADR-0101]
    branch_protection_context: "real-tooling E2E (must run, not skip)"
    failure_evidence: "FANOPS_REQUIRE_E2E=1 turns an integration skip into a failure; the job is a LIVE required context."
    evidence_status: verified-this-session
    status: active
    trigger_gate:
      since: 2026-07-22
      supersedes: >-
        The `relevance_gate` recorded here earlier the same day. It ran the full lane for any change
        outside `docs/`, `.claude/`, `.reports/` and root `*.md` — that is, for all real work — so
        the suite still gated every ordinary push and every PR iteration while being described as
        relevance-gated. Operator decision: the full real-tooling E2E is not a push/PR gate.
      decided_by: "scripts/ci_e2e_trigger.py (pure `decide()`; proven both directions by tests/test_ci_e2e_trigger.py in the unit lane)"
      always_reports: >-
        The job has NO workflow-level `paths:` filter and always runs, because a required workflow
        that is skipped by a path filter never reports and leaves branch protection pending forever.
        The gate is INSIDE the job and controls only whether the ~7 minutes of work execute.
      runs_in_full_when: >-
        the event is `workflow_dispatch` (manual) or `schedule` (the 04:00 UTC nightly), or the pull
        request carries the `force-e2e` label or `[force-e2e]` in its title. Nothing else runs it —
        not a push to main, not a pull request, and not any changed path.
      skips_work_when: "every ordinary push and pull_request event, and any event not named above."
      polarity: >-
        INVERTED from the relevance gate, deliberately. That predicate failed toward MORE testing
        because an unclassified path might have mattered. This one cannot, without reinstating the
        behaviour that was removed: an unrecognised event is by construction not one an operator
        asked the heavy lane to run on.
      disclosed_consequence: >-
        NOTHING in the real-tooling suite runs on a pull request. That is: the real ffmpeg/whisper/
        espeak integration tests, and the `@pytest.mark.slow` hermetic cross-face proofs — including
        the arch negative controls (CI-E2E-NEGCONTROLS) and the capstone per-persona and
        account-first E2E proofs — are absent from PR feedback entirely, because the unit lane
        deselects both `integration` and `slow`. A render, publish or per-persona regression can
        therefore merge green and be caught only by the nightly run, a manual dispatch, or in
        production. This is the accepted cost of not holding PR iteration for ~7 minutes; the
        nightly schedule exists so the window is a day rather than unbounded.

  - id: CI-E2E-TOOLCHAIN
    name: "Verify toolchain on PATH"
    parent: CI-E2E
    invariant: "ffmpeg + ffprobe + whisper + espeak are all present before the suite runs"
    owner: ci-lane
    workflow: .github/workflows/ci.yml
    job: e2e
    step: "Verify toolchain on PATH"
    command: 'for b in ffmpeg ffprobe whisper espeak; do command -v "$b" || exit 1; done'
    trigger: [workflow_dispatch, schedule]
    classification: scheduled
    runtime_class: fast
    justification: "fails clearly and early on a missing tool instead of mid-test."
    deletion_consequence: "a missing binary surfaces as a confusing deep failure rather than an obvious one."
    duplicate_group: null
    adr: [ADR-0101]
    failure_evidence: "the loop exits 1 on any missing binary."
    evidence_status: verified-this-session
    status: active

  - id: CI-E2E-INTEGRATION
    name: "Integration suite — E2E MUST run"
    parent: CI-E2E
    invariant: "the real-toolchain integration suite is green AND actually executed (never skipped)"
    owner: ci-lane
    workflow: .github/workflows/ci.yml
    job: e2e
    step: "Integration suite — E2E MUST run (FANOPS_REQUIRE_E2E=1 fails on skip)"
    command: 'python -m pytest -q -m "integration and not ci_hook_regression and not asr" -rs'
    trigger: [workflow_dispatch, schedule]
    classification: scheduled
    runtime_class: slow
    justification: "the executed proof that the pipeline works against real ffmpeg/whisper."
    deletion_consequence: "the pipeline's real-tooling proof disappears; a mock could mask a broken render."
    duplicate_group: null
    adr: [ADR-0101]
    failure_evidence: "FANOPS_REQUIRE_E2E=1 fails on skip; any failing integration test reddens the job."
    evidence_status: verified-this-session
    status: active

  - id: CI-E2E-SLOW
    name: "Slow cross-face proofs"
    parent: CI-E2E
    invariant: "the hermetic cross-face @slow proofs (account-first, per-persona, hashtag-lifecycle, review-lanes) pass; run serially (no -n auto)"
    owner: ci-lane
    workflow: .github/workflows/ci.yml
    job: e2e
