name: open-feature-pr

# Cursor cloud-agent tokens can push branches but lack pull_requests:write. This one-shot
# workflow opens the PR so CI + merge can proceed on protected main.
on:
  push:
    branches:
      - cursor/source-sharding-ae3e

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    if: github.repository == 'Fleezyflo/fanops'
    runs-on: ubuntu-latest
    steps:
      - name: Open PR to main (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          existing=$(gh pr list --head "${{ github.ref_name }}" --base main --json number -q '.[0].number' || true)
          if [ -n "$existing" ] && [ "$existing" != "null" ]; then
            echo "PR #$existing already open"
            exit 0
          fi
          gh pr create --base main --head "${{ github.ref_name }}" \
            --title "feat(ingest): S03 native inbox source sharding at catalogue" \
            --body "Automated PR open for S03 source sharding (cloud-agent token lacks pull_requests:write)."
