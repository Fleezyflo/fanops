name: codemap-sync

# Always-on codemap drift guard. When src/fanops changes land on main, launch a Cursor
# background agent to re-sync docs/CODEMAPS/ against the code and open a PR. Cursor Cloud
# Agents have no native GitHub-event trigger — the only automatable path is the launch API
# (POST https://api.cursor.com/v1/agents), which this workflow calls.
#
# One-time setup (operator): add a CURSOR_API_KEY repo secret
#   (Cursor Dashboard -> API Keys -> service-account key), then this runs hands-off.
# Without the secret the job no-ops with a clear message instead of failing the push.

on:
  push:
    branches: [main]
    paths:
      - "src/fanops/**"

permissions:
  contents: read

concurrency:
  group: codemap-sync
  cancel-in-progress: true

jobs:
  launch-sync-agent:
    name: launch codemap-sync agent
    runs-on: ubuntu-latest
    steps:
      - name: Launch Cursor background agent
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          SHA: ${{ github.sha }}
        run: |
          if [ -z "${CURSOR_API_KEY}" ]; then
            echo "CURSOR_API_KEY not set — skipping. Add it as a repo secret to enable auto codemap-sync." >&2
            exit 0
          fi
          read -r -d '' PROMPT <<'EOF' || true
          src/fanops changed on main. Re-sync docs/CODEMAPS/ so every claim matches the current code.

          Method:
          1. Re-run the deterministic extractors: `python3 .reports/ast_extract.py src > .reports/structural_index.json` then `python3 .reports/build_graphs.py` (stdlib-only, per full-trace-index.md "How to regenerate").
          2. For each doc under docs/CODEMAPS/ (incl. subsystem-traces/C1..C10, full-trace-index.md, system-lens-map.md, data.md, dependencies.md, insights-culmination.md, persona-levers.md, hashtag-lifecycle.md, fresh-ingestion-trace.md), verify every file:line anchor and every named symbol/stage/flag against the current src. The prose (semantic) layer is NOT machine-regenerable — read the code and correct it.
          3. RULE: a stale mention is a lead, not an auto-delete. Where a doc calls removed code "live", fix it to the current model. Where a doc records prior design as HISTORY, keep it but date-tag it (e.g. "(removed <MOL-id>)"). Dated audit snapshots (e.g. lifecycle-full-picture.md, header carries a date) get a "superseded by" banner, never a silent rewrite.
          4. Only touch docs/CODEMAPS/ (+ the .reports/ regenerated artifacts). No src, no tests.
          5. Open a PR to main titled "docs(codemaps): auto-sync to <short-sha>" summarizing what drifted and what you corrected. If nothing drifted, open no PR.
          EOF
          jq -n --arg text "$PROMPT" --arg ref "$SHA" \
            '{prompt:{text:$text}, repos:[{url:"https://github.com/Fleezyflo/fanops", startingRef:$ref}]}' \
          | curl --fail-with-body --silent --show-error \
              --request POST --url https://api.cursor.com/v1/agents \
              -u "${CURSOR_API_KEY}:" \
              --header 'Content-Type: application/json' \
              --data @-
