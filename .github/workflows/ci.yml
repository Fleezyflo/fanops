name: CI

# AUDIT H10: the real-tooling E2E (tests/integration/test_e2e_real.py) is the proof the pipeline
# is "not just mocks" — real ffmpeg + real whisper + a real clip render. Locally, integration-marked
# tests SKIP when the toolchain is absent (a clean skip beats a cryptic failure). CI sets
# FANOPS_REQUIRE_E2E=1 on the e2e job: conftest's pytest_runtest_makereport hook turns any
# integration-marked skip into a FAILURE (non-integration skips are unaffected). The unit job sets
# FANOPS_REQUIRE_STUDIO=1: conftest's pytest_configure aborts collection if flask is absent (studio
# tests use importorskip and would otherwise skip silently). Cross-face hermetic proofs carry
# @pytest.mark.slow — unit job deselects them; e2e job runs them in a separate step.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read   # MOL-452: download partial timing artifacts on main

jobs:
  unit:
    name: unit (fast, no toolchain)
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0          # MOL-193: full history so the PR-diff secret scan can resolve the base
      - name: Secret scan (PR diff) — MOL-193
        if: github.event_name == 'pull_request'
        run: ./scripts/scan-secrets.sh diff-base "${{ github.event.pull_request.base.sha }}"
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/ci-unit.txt
      - name: Lockfile drift guard (pyproject deps must not change without regen — MOL-195)
        if: github.event_name == 'pull_request'
        run: ./scripts/check-locks.sh "${{ github.event.pull_request.base.sha }}"
      - name: Install from hashed lock (MOL-195 — reproducible + hash-verified)
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements/ci-unit.txt
          pip install -e . --no-deps
      - name: CI env probe (unit lane — MEASURE ffmpeg/cv2, do not infer from YAML)
        run: python scripts/ci_env_probe.py
      - name: Lint (ruff — pyflakes F + pycodestyle E, the house ruleset in pyproject)
        run: ruff check .          # was configured in pyproject but never enforced in CI (Phase 4b)
      - name: Unit tests
        id: unit-tests
        env:
          FANOPS_REQUIRE_STUDIO: "1"   # #13: flask is installed above, so this stays green — but it now FAILS if a future extras regression drops flask (no silent studio-test skip)
        run: |
          set -o pipefail
          python -m pytest -q -n auto -m "not integration and not slow" \
            --durations=25 --durations-min=1.0 2>&1 | tee pytest-unit.log   # MOL-452: advisory slow-test report; MOL-199: coverage dropped (no --cov-fail-under)
      - name: CI duration report (unit)
        if: always() && steps.unit-tests.outcome != 'cancelled'
        continue-on-error: true
        run: |
          python scripts/ci_timing_report.py --step unit --log pytest-unit.log \
            --sha "${{ github.sha }}" --xdist --json-out ci-timing.partial.json
      - name: Unit pytest SLO gate (blocking — MOL-460)
        if: always() && steps.unit-tests.outcome != 'cancelled'
        env:
          CI_UNIT_PYTEST_BUDGET_S: ${{ github.event_name == 'pull_request' && '135' || '140' }}
        run: python scripts/ci_slo_gate.py --log pytest-unit.log
      - name: Upload ci-timing partial (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-timing-part-unit
          path: ci-timing.partial.json
          if-no-files-found: ignore
      - name: Verify FANOPS_REQUIRE_E2E skip→fail hook (must fail, not skip)
        env:
          FANOPS_REQUIRE_E2E: "1"
        run: |
          set +e
          python -m pytest -q tests/test_ci_require_e2e.py
          test $? -eq 1

  base-install:
    # The unit job installs the [framing] extra (opencv) because smart_framing defaults ON and the render
    # path HARD-REQUIRES cv2. This job restores the coverage the unit lane thereby loses: a CLEAN base
    # install (no extras, LITERAL fresh venv) must still import fanops + its CLI, run a representative
    # non-render op (`fanops --help`), and REFUSE loudly (ToolchainMissingError) on the missing render
    # prerequisite — never a silent centre-crop. It asserts NOTHING about smart_framing OFF (that is the
    # separate F3 off-switch decision). A dedicated clean-venv job so the base packaging contract cannot
    # rot unnoticed. Seconds; base deps only (pydantic/requests/yt-dlp), no toolchain, no lock.
    name: base install (no extras) refuses smart-framing
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Clean base install in a LITERAL fresh venv (no extras — cv2 genuinely absent)
        run: |
          python -m venv .venv-base
          . .venv-base/bin/activate
          python -m pip install --upgrade pip
          python -m pip install .
      - name: Base-install smoke — cv2 absent, fanops+CLI import, representative op, render prereq refuses
        run: |
          . .venv-base/bin/activate
          python scripts/base_install_smoke.py

  e2e:
    name: real-tooling E2E (must run, not skip)
    timeout-minutes: 25
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/ci-e2e.txt
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            /var/cache/apt
            /var/lib/apt/lists
          key: apt-ffmpeg-espeak-${{ hashFiles('.github/workflows/ci.yml') }}-${{ runner.os }}
          restore-keys: |
            apt-ffmpeg-espeak-${{ runner.os }}-
      - name: Install real toolchain (ffmpeg + espeak TTS)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak
      - name: Install from hashed lock (dev+transcribe+studio+compose+framing; MOL-195/196 — reproducible)
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements/ci-e2e.txt
          pip install -e . --no-deps
      - name: Cache whisper 'tiny' checkpoint
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/whisper
          key: whisper-tiny-${{ hashFiles('pyproject.toml') }}-${{ runner.os }}
          restore-keys: |
            whisper-tiny-${{ runner.os }}-
      - name: Pre-fetch whisper 'tiny' (so the E2E never needs a network fetch mid-test)
        run: |
          python -c "import whisper; whisper.load_model('tiny')"
      - name: Verify toolchain on PATH
        run: |
          for b in ffmpeg ffprobe whisper espeak; do command -v "$b" || { echo "MISSING: $b"; exit 1; }; done
      - name: Integration suite — E2E MUST run (FANOPS_REQUIRE_E2E=1 fails on skip)
        id: e2e-integration
        env:
          FANOPS_REQUIRE_E2E: "1"
          FANOPS_REQUIRE_STUDIO: "1"
          FANOPS_WHISPER_MODEL: "tiny"
        run: |
          set -o pipefail
          python -m pytest -q -m "integration and not ci_hook_regression and not asr" -rs \
            --durations=25 --durations-min=1.0 2>&1 | tee pytest-e2e-integration.log   # MOL-452
      - name: CI duration report (e2e integration)
        if: always() && steps.e2e-integration.outcome != 'cancelled'
        continue-on-error: true
        run: |
          python scripts/ci_timing_report.py --step e2e_integration --log pytest-e2e-integration.log \
            --sha "${{ github.sha }}" --json-out ci-timing.partial.json
      - name: Slow cross-face proofs (hermetic — no real toolchain required)
        id: e2e-slow
        env:
          FANOPS_REQUIRE_STUDIO: "1"
        run: |
          set -o pipefail
          python -m pytest -q -m slow --durations=25 --durations-min=1.0 2>&1 | tee pytest-e2e-slow.log   # MOL-452
      - name: CI duration report (e2e slow)
        if: always() && steps.e2e-slow.outcome != 'cancelled'
        continue-on-error: true
        run: |
          python scripts/ci_timing_report.py --step e2e_slow --log pytest-e2e-slow.log \
            --sha "${{ github.sha }}" --json-out ci-timing.partial.json --merge-in
      - name: Upload ci-timing partial (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-timing-part-e2e
          path: ci-timing.partial.json
          if-no-files-found: ignore

  ci-timing:
    name: ci-timing artifact (main only)
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.unit.result != 'cancelled' && needs.e2e.result != 'cancelled'
    needs: [unit, e2e]
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: ci-timing-part-*
          path: timing-parts
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Merge ci-timing.json
        run: |
          python scripts/ci_timing_report.py --merge timing-parts \
            --sha "${{ github.sha }}" --json-out ci-timing.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-timing
          path: ci-timing.json
