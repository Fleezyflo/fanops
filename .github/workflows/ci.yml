name: CI

# Skip→fail enforcement (no silent false greens):
# - FANOPS_REQUIRE_E2E=1 (e2e job): any @pytest.mark.integration skip becomes a FAILURE via conftest hook.
# - FANOPS_REQUIRE_STUDIO=1 (unit + e2e): flask absence aborts collection (studio tests must run, not skip).
# - Cross-face hermetic proofs carry @pytest.mark.slow — unit job deselects them; e2e job runs them.
# Locally, integration tests SKIP when the real toolchain is absent; CI installs it and requires execution.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: unit (fast, no toolchain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py3.12-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-py3.12-
      - name: Install (dev + studio = flask, so the studio route tests run not skip)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,studio]'
      - name: Lint (ruff — pyflakes F + pycodestyle E, the house ruleset in pyproject)
        run: ruff check .          # was configured in pyproject but never enforced in CI (Phase 4b)
      - name: Unit tests (with coverage report)
        env:
          FANOPS_REQUIRE_STUDIO: "1"   # #13: flask is installed above, so this stays green — but it now FAILS if a future extras regression drops flask (no silent studio-test skip)
        run: python -m pytest -q -m "not integration and not slow" --cov=src/fanops --cov-report=term-missing   # report-only, NOT a gate (no --cov-fail-under)

  e2e:
    name: real-tooling E2E (must run, not skip)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install real toolchain (ffmpeg + espeak TTS)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py3.12-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-py3.12-
      - name: Install (dev + transcribe = openai-whisper + studio = flask + compose = moviepy)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,transcribe,studio,compose]'
      - name: Cache whisper 'tiny' checkpoint
        uses: actions/cache@v4
        with:
          path: ~/.cache/whisper
          key: whisper-tiny-v1
      - name: Pre-fetch whisper 'tiny' (so the E2E never needs a network fetch mid-test)
        run: |
          python -c "import whisper; whisper.load_model('tiny')"
      - name: Verify toolchain on PATH
        run: |
          for b in ffmpeg ffprobe whisper espeak; do command -v "$b" || { echo "MISSING: $b"; exit 1; }; done
      - name: Integration suite — E2E MUST run (FANOPS_REQUIRE_E2E=1 fails on skip)
        env:
          FANOPS_REQUIRE_E2E: "1"
          FANOPS_REQUIRE_STUDIO: "1"
          FANOPS_WHISPER_MODEL: "tiny"
        run: python -m pytest -q -m integration -rs
      - name: Slow cross-face proofs (hermetic — no real toolchain required)
        env:
          FANOPS_REQUIRE_STUDIO: "1"
        run: python -m pytest -q -m slow
