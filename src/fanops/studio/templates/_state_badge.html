{# Unified state/delivery chip: queued | due | inflight | live | dryrun | failed | awaiting #}
{% macro state_badge(kind, title=none, testid=none) -%}
<span class="state-badge state-{{ kind }}"{% if title %} title="{{ title }}"{% endif %}{% if testid %} data-testid="{{ testid }}"{% endif %}>{{ kind }}</span>
{%- endmacro %}
