{# Phase 4 per-source filter chip row. chip_route names the target page (review|schedule|posted). #}
{% if sources and sources|length > 1 %}
<nav class="source-chips" aria-label="Filter by source">
  <a class="button{{ ' active' if not active_source|default(none) else '' }}"{% if not active_source|default(none) %} aria-current="page"{% endif %}
     href="{{ url_for(chip_route|default('review'), view=active_view|default(none), account=active, batch=active_batch|default(none), state=active_state|default(none), delivery=active_delivery|default(none), failure=active_failure|default(none), compact=compact_param) }}">All sources</a>
  {% for skey, slabel in sources %}
  <a class="button{{ ' active' if active_source|default(none) == skey else '' }}"{% if active_source|default(none) == skey %} aria-current="page"{% endif %}
     href="{{ url_for(chip_route|default('review'), view=active_view|default(none), account=active, batch=active_batch|default(none), state=active_state|default(none), source=skey, delivery=active_delivery|default(none), failure=active_failure|default(none), compact=compact_param) }}">{{ slabel }}</a>
  {% endfor %}
</nav>
{% endif %}
